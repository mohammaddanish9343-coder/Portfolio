<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        .messages-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .message-item {
            background: #f5f5f5;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 12px;
        }

        .message-name {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .message-email {
            color: #666;
            font-size: 14px;
        }

        .message-time {
            color: #999;
            font-size: 12px;
        }

        .message-content {
            color: #555;
            line-height: 1.6;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .delete-btn {
            background: #032e04;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .no-messages {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .control-btn:hover {
            background: #0056b3;
        }

        .message-count {
            background: #e7f3ff;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            color: #01060c;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="logo">My Portfolio</div>
        <nav id="navbar">
            <a href="index.html">Home</a>
            <a href="messages.html">Messages</a>
        </nav>
        <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>
    </header>

    <!-- ===== MESSAGES SECTION ===== -->
    <section class="section">
        <h2>Contact Messages</h2>

        <div class="messages-container">
            <div class="controls">
                <button class="control-btn" onclick="loadMessages()">Refresh</button>
                <button class="control-btn" onclick="exportToText()">Export as Text</button>
                <button class="control-btn" onclick="deleteAllMessages()" style="background: #dc3545;">Delete All</button>
                <div class="message-count" id="messageCount">Loading...</div>
            </div>

            <div id="messagesDisplay" class="loading">Loading messages...</div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script src="messages.js"></script>
</body>
</html>
